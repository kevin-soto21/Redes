<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>AUTH_REQUIRED</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-card" style="max-width:400px; margin:100px auto; padding:40px; border:2px solid #00f2ff; background:#0d1117;">
        <h1 style="color:#00f2ff; font-family:monospace;">ID_REQUIRED</h1>
        <form method="POST">
            <div style="margin-bottom:20px;">
                <label style="color:#6e7681; display:block;">USUARIO</label>
                <input type="text" name="username" required style="width:100%; background:#000; color:#00f2ff; border:1px solid #30363d; padding:10px;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="color:#6e7681; display:block;">PASSWORD</label>
                <input type="password" name="password" required style="width:100%; background:#000; color:#00f2ff; border:1px solid #30363d; padding:10px;">
            </div>
            <button type="submit" style="width:100%; padding:10px; background:transparent; border:1px solid #00f2ff; color:#00f2ff; cursor:pointer;">INICIAR_SESIÓN</button>
        </form>
        {% if error %}<p style="color:#ff0055; margin-top:20px;">{{ error }}</p>{% endif %}
    </div>
</body>
</html>
