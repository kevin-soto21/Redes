<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Alarma</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.4s ease;
        }
        #panel {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            background: #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 2px solid #444;
        }
        .led {
            width: 90px; height: 90px; border-radius: 50%;
            background-color: #2ecc71; margin: 25px auto;
            box-shadow: 0 0 25px #2ecc71;
            transition: 0.4s;
        }
        .alarm-active { background-color: #7b0000 !important; }
        .alarm-active .led {
            background-color: #ff0000;
            box-shadow: 0 0 50px #ff0000;
            animation: pulse 0.6s infinite;
        }
        @keyframes pulse { 50% { opacity: 0.3; } }
        .logout-link { margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .logout-link:hover { color: white; }
    </style>
</head>
<body id="body">

    <div id="panel">
        <h1>MONITOR PIR</h1>
        <div id="led" class="led"></div>
        <h2 id="msg">SISTEMA EN VIGILANCIA</h2>
        <p>Sesión iniciada: <b>Kevin</b></p>
        <a href="/logout" class="logout-link">Cerrar Sesión</a>
    </div>

    <script>
        var socket = io();
        var body = document.getElementById('body');
        var msg = document.getElementById('msg');

        socket.on('aviso', function() {
            // Activar Alerta Visual
            body.classList.add('alarm-active');
            msg.innerText = "¡MOVIMIENTO DETECTADO!";

            // Regresar a la normalidad después de 4 segundos
            setTimeout(function() {
                body.classList.remove('alarm-active');
                msg.innerText = "SISTEMA EN VIGILANCIA";
            }, 4000);
        });
    </script>
</body>
</html>
